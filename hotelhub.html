<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#161b22"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HotelHub"/>
<link rel="manifest" href="/manifest.json"/>
<title>HotelHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#c9d1d9;font-family:Inter,system-ui,sans-serif;min-height:100vh;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#0d1117;}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px;}
/* Nav */
.nav{display:flex;align-items:center;background:#161b22;border-bottom:1px solid #21262d;padding:0 14px;height:52px;flex-shrink:0;position:sticky;top:0;z-index:100;gap:2px;}
.nav-logo{display:flex;align-items:center;gap:7px;margin-right:16px;font-weight:700;font-size:14px;color:#f0f6fc;cursor:pointer;flex-shrink:0;}
.nav-btn{background:none;border:none;padding:0 10px;height:52px;cursor:pointer;font-size:12px;color:#8b949e;border-bottom:2px solid transparent;white-space:nowrap;position:relative;}
.nav-btn.active{color:#f0f6fc;font-weight:600;border-bottom:2px solid #388bfd;}
.nav-btn.alert-tab{color:#f85149;border-bottom:2px solid #f85149;}
.nav-user{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0;}
.role-badge{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;}
/* Layout */
.page{padding:18px 20px;max-width:1400px;margin:0 auto;}
/* Cards */
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;color:#f0f6fc;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
/* Buttons */
.btn{border-radius:6px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600;border:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-primary{background:#238636;color:#fff;border:1px solid #2ea043;}
.btn-secondary{background:none;color:#8b949e;border:1px solid #30363d;}
.btn-danger{background:none;color:#f85149;border:1px solid #6e2c2c;}
.btn-blue{background:#1f4a8a;color:#58a6ff;border:1px solid #388bfd;}
.btn-yellow{background:#2a2000;color:#d29922;border:1px solid #4a3800;}
.btn-sm{padding:4px 9px;font-size:12px;}
/* Inputs */
.inp{background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#f0f6fc;padding:7px 10px;font-size:13px;outline:none;width:100%;}
.inp:focus{border-color:#388bfd;}
.sel{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:6px 9px;font-size:13px;cursor:pointer;outline:none;}
/* Form */
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.form-label{font-size:11px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:#0d1117;color:#8b949e;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;border-bottom:1px solid #21262d;}
.tbl td{padding:8px 10px;border-bottom:1px solid #21262d;vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,0.02);}
.tbl tr.alt td{background:#080d12;}
/* Badges */
.badge{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block;}
.b-green{background:#1a3a1a;color:#3fb950;border:1px solid #2d5a2d;}
.b-red{background:#3d1c1c;color:#f85149;border:1px solid #6e2c2c;}
.b-blue{background:#1a2a3a;color:#58a6ff;border:1px solid #1f4a8a;}
.b-yellow{background:#2a2000;color:#d29922;border:1px solid #4a3800;}
.b-grey{background:#1a1a1a;color:#8b949e;border:1px solid #30363d;}
.b-purple{background:#2a1a3a;color:#bc8cff;border:1px solid #4a2a6a;}
/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:#161b22;border:1px solid #21262d;border-radius:14px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.6);}
/* Stats */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat-box{flex:1;min-width:100px;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:12px 14px;}
.stat-val{font-size:22px;font-weight:700;}
.stat-lbl{font-size:11px;color:#8b949e;margin-top:2px;}
/* Inventory row */
.inv-item-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #21262d;}
.inv-item-row:last-child{border-bottom:none;}
.inv-qty{font-size:18px;font-weight:700;min-width:45px;text-align:center;}
.qty-low{color:#f85149;}
.qty-mid{color:#d29922;}
.qty-ok{color:#3fb950;}
/* Collapsible group */
.group-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#161b22;border:1px solid #21262d;border-radius:8px 8px 0 0;cursor:pointer;user-select:none;}
.group-hdr-closed{border-radius:8px;}
.group-body{border:1px solid #21262d;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:10px;}
/* Checklist */
.ck-table{width:100%;border-collapse:collapse;}
.ck-table th{background:#0d1117;color:#8b949e;font-size:10px;font-weight:600;text-transform:uppercase;padding:6px 10px;text-align:left;}
.ck-table td{padding:6px 10px;border-top:1px solid #21262d;font-size:12px;}
.ck-btn{width:28px;height:28px;border-radius:5px;cursor:pointer;border:1.5px solid #30363d;background:transparent;color:#484f58;font-size:13px;display:inline-flex;align-items:center;justify-content:center;}
.ck-btn.done{border-color:#7c7ce0;background:#1a1e30;color:#7c7ce0;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.7);}
.modal-title{font-size:15px;font-weight:700;color:#f0f6fc;margin-bottom:14px;}
/* Toast */
.toast{position:fixed;top:14px;right:14px;z-index:9999;border-radius:8px;padding:9px 16px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none;}
/* Search */
.search-wrap{position:relative;}
.search-wrap .inp{padding-left:30px;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#8b949e;font-size:13px;pointer-events:none;}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.dash-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:18px 16px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center;}
.dash-card:hover{border-color:#388bfd;background:#1a2030;}
.dash-card-icon{font-size:32px;margin-bottom:8px;}
.dash-card-label{font-size:13px;font-weight:600;color:#f0f6fc;}
.dash-card-sub{font-size:11px;color:#8b949e;margin-top:3px;}
/* Quick-edit inline */
.qe-row{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid #21262d;min-height:40px;}
.qe-row:last-child{border-bottom:none;}
.qe-name{flex:1;font-size:13px;color:#c9d1d9;}
.qe-acts{display:flex;gap:4px;flex-shrink:0;}
/* Mobile */
@media(max-width:580px){
  .page{padding:10px 8px;}
  .hide-mobile{display:none!important;}
  .nav-btn{padding:0 6px;font-size:11px;}
  .dash-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app"></div>
<script>
// ============================================================
// CONSTANTS
// ============================================================
var ROLES={
  admin:    {label:"Admin",    color:"#f85149",bg:"#3d1c1c"},
  direction:{label:"Direction",color:"#d29922",bg:"#2a2000"},
  reception:{label:"Reception",color:"#58a6ff",bg:"#1a2a3a"},
  tech:     {label:"Tech",     color:"#3fb950",bg:"#1a3a1a"},
  etage:    {label:"Etage",    color:"#bc8cff",bg:"#2a1a3a"}
};
var MODULES=[
  {id:"hotelcheck",    label:"HotelCheck",       icon:"📋"},
  {id:"maintenance",   label:"Maintenance",       icon:"🔧"},
  {id:"inventory_tech",label:"Inv. Tech",         icon:"⚙️"},
  {id:"inventory_pdj", label:"Inv. PDJ",           icon:"🍳"},
  {id:"inventory_fdc", label:"Inv. F.Chambre",    icon:"🛏️"}
];
var INTERVALS=[
  {value:"daily",    label:"Quotidien"},
  {value:"weekly",   label:"Hebdomadaire"},
  {value:"biweekly", label:"Bi-mensuel"},
  {value:"monthly",  label:"Mensuel"},
  {value:"quarterly",label:"Trimestriel"},
  {value:"yearly",   label:"Annuel"}
];
var ICOLORS={
  daily:    {bg:"#1a2e1a",border:"#2d5a2d",dot:"#4caf50"},
  weekly:   {bg:"#1a261a",border:"#2a4a2a",dot:"#66bb6a"},
  biweekly: {bg:"#1a2a3a",border:"#2a4a6a",dot:"#42a5f5"},
  monthly:  {bg:"#1a1e30",border:"#2a2e50",dot:"#7c7ce0"},
  quarterly:{bg:"#2a1a2a",border:"#4a2a4a",dot:"#ba68c8"},
  yearly:   {bg:"#2a1a2a",border:"#4a2a2a",dot:"#ef5350"}
};
var MONTHS=["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];
var STATUTS=["En cours","Resolu","En attente","Annule"];
var STAFF_COLORS=["#388bfd","#3fb950","#d29922","#f78166","#bc8cff","#39c5cf","#ff6b9d","#ffa500"];
var INV_NAMES={tech:"Inventaire Tech",pdj:"Inventaire PDJ",fdc:"Inv. Femmes de Chambre"};
var INV_ICONS={tech:"⚙️",pdj:"🍳",fdc:"🛏️"};

// ============================================================
// STATE
// ============================================================
var S={
  loaded:false, loggedIn:false, user:null, permissions:{},
  data:{users:[],permissions:{},tasks:[],locations:[],staff:[],checks:{},history:[],interventions:[],
        inventory:{tech:{items:[],movements:[]},pdj:{items:[],movements:[]},fdc:{items:[],movements:[]}}},
  page:"dashboard",
  // checklist
  ckFilterInt:"all", ckFilterLoc:"all", ckCollapsed:{}, ckShowDone:true, ckStaffPicker:null,
  // maintenance
  mSearch:"", mFilterStatus:"all", mFilterLoc:"all",
  mShowForm:false, mEditId:null,
  mForm:{locId:"",locName:"",date:"",description:"",reportedBy:"",assignedTo:"",status:"En cours",resolvedDate:"",comment:""},
  // inventory
  invTab:"tech", invSearch:"",
  invShowForm:false, invEditId:null, invForm:{name:"",category:"",qty:0,minQty:0,unit:"unite"},
  invShowMove:false, invMoveForm:{itemId:"",type:"out",qty:1,note:""},
  // admin
  adminTab:"users", adminShowForm:false, adminEditId:null,
  adminForm:{name:"",username:"",password:"",role:"reception"},
  // settings
  settingsTab:"tasks",
  newTask:"",newInterval:"monthly",newTaskLocs:"all",newTaskLocIds:[],
  editTaskId:null,editTaskName:"",editTaskInterval:"monthly",editTaskLocScope:"all",editTaskLocIds:[],
  newLoc:"",
  editLocId:null,editLocName:"",
  newStaff:"",newStaffColor:"#388bfd",
  editStaffId:null,editStaffName:"",editStaffColor:"#388bfd",
  // modal
  modal:null
};

// ============================================================
// UTILS
// ============================================================
function uid(){return Math.random().toString(36).slice(2,10);}
function today(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return n<10?"0"+n:""+n;}
function fmtDate(s){if(!s)return"";var p=s.split("-");if(p.length===3)return p[2]+"/"+p[1]+"/"+p[0];return s;}
function getWeek(d){var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);var ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7);}
function getPeriodKey(iv){var d=new Date(),y=d.getFullYear(),m=pad(d.getMonth()+1),w=pad(getWeek(d)),day=pad(d.getDate()),q=Math.ceil((d.getMonth()+1)/3);if(iv==="daily")return y+"-"+m+"-"+day;if(iv==="weekly")return y+"-W"+w;if(iv==="biweekly")return y+"-"+m+"-"+(d.getDate()<=15?"A":"B");if(iv==="monthly")return y+"-"+m;if(iv==="quarterly")return y+"-Q"+q;return""+y;}
function periodLabel(iv){var d=new Date();if(iv==="daily")return"Aujourd'hui, "+d.getDate()+" "+MONTHS[d.getMonth()];if(iv==="weekly")return"Sem. "+getWeek(d)+" / "+d.getFullYear();if(iv==="biweekly")return(d.getDate()<=15?"1ere":"2eme")+" quinz. "+MONTHS[d.getMonth()];if(iv==="monthly")return MONTHS[d.getMonth()]+" "+d.getFullYear();if(iv==="quarterly")return"T"+Math.ceil((d.getMonth()+1)/3)+" "+d.getFullYear();return""+d.getFullYear();}
function getPeriodEnd(iv){var d=new Date(),e;if(iv==="daily"){e=new Date(d);e.setHours(23,59,59,999);return e;}if(iv==="weekly"){e=new Date(d);var dy=e.getDay()||7;e.setDate(e.getDate()+(7-dy));e.setHours(23,59,59,999);return e;}if(iv==="biweekly"){e=new Date(d);if(d.getDate()<=15)e.setDate(15);else e.setMonth(e.getMonth()+1,0);e.setHours(23,59,59,999);return e;}if(iv==="monthly")return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);if(iv==="quarterly"){var q=Math.ceil((d.getMonth()+1)/3);return new Date(d.getFullYear(),q*3,0,23,59,59,999);}return new Date(d.getFullYear(),11,31,23,59,59,999);}
function hoursLeft(iv){return Math.max(0,(getPeriodEnd(iv)-new Date())/3600000);}
function checkKey(lid,tid,iv){return lid+"__"+tid+"__"+getPeriodKey(iv);}
function intLabel(iv){for(var i=0;i<INTERVALS.length;i++)if(INTERVALS[i].value===iv)return INTERVALS[i].label;return iv;}
function locApplies(t,locId){var s=t.locationScope||"all";if(s==="all")return true;for(var i=0;i<s.length;i++)if(s[i]===locId)return true;return false;}
function canAccess(mod){return S.permissions[mod]===true;}
function isMobile(){return window.innerWidth<580;}
function getOverdue(){
  var items=[],activeLocs=S.data.locations.filter(function(l){return l.active;});
  for(var i=0;i<S.data.tasks.length;i++){
    var task=S.data.tasks[i],h=hoursLeft(task.interval);
    if(h<48){
      var pending=[];
      for(var j=0;j<activeLocs.length;j++){
        var loc=activeLocs[j];
        if(locApplies(task,loc.id)&&!S.data.checks[checkKey(loc.id,task.id,task.interval)])pending.push(loc);
      }
      if(pending.length>0)items.push({task:task,hoursLeft:h,pending:pending});
    }
  }
  return items;
}
function getLowStock(){
  var items=[];
  for(var t in S.data.inventory){
    var inv=S.data.inventory[t];
    for(var i=0;i<inv.items.length;i++){
      var it=inv.items[i];
      if(it.minQty>0&&it.qty<=it.minQty)items.push({item:it,invType:t});
    }
  }
  return items;
}

// ============================================================
// PERSISTENCE
// ============================================================
function loadFromServer(){
  // Try to restore session first
  var hasSession=loadSession();
  fetch("/api/data").then(function(r){return r.json();}).then(function(d){
    S.data=d;S.loaded=true;
    if(hasSession)S.page="dashboard";
    _lastRefresh=Date.now();
    render();
  }).catch(function(){S.loaded=true;render();});
}
function persist(){
  fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(S.data)}).catch(function(){});
}
function doLogin(username,password){
  fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username,password:password})})
  .then(function(r){return r.json();}).then(function(res){
    if(res.ok){S.loggedIn=true;S.user=res.user;S.permissions=res.permissions;S.page="dashboard";saveSession();render();}
    else showToast(res.error||"Identifiants incorrects","error");
  }).catch(function(){showToast("Erreur de connexion","error");});
}
function logout(){S.loggedIn=false;S.user=null;S.permissions={};S.page="dashboard";clearSession();render();}
function getFirstPage(){
  if(canAccess("hotelcheck"))return"hotelcheck";
  if(canAccess("maintenance"))return"maintenance";
  if(canAccess("inventory_tech")||canAccess("inventory_pdj")||canAccess("inventory_fdc"))return"inventory";
  return"dashboard";
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg,type){
  var t=document.getElementById("toast");
  if(!t)return;
  t.className="toast "+(type==="error"?"b-red":"b-green");
  t.style.display="block";
  t.textContent=(type==="error"?"❌ ":"✅ ")+msg;
  setTimeout(function(){t.style.display="none";},3000);
}

// ============================================================
// DOM HELPERS
// ============================================================
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==="class")e.className=attrs[k];
    else if(k==="style")e.style.cssText=attrs[k];
    else if(typeof attrs[k]==="function")e.addEventListener(k.replace(/^on/,""),attrs[k]);
    else e[k]=attrs[k];
  }
  if(children)for(var i=0;i<children.length;i++){var c=children[i];if(c==null)continue;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(""+c):c);}
  return e;
}
function div(cls,style,ch){return el("div",{"class":cls||"","style":style||""},ch||[]);}
function span(cls,style,ch){return el("span",{"class":cls||"","style":style||""},ch||[]);}
function h2(text,style){return el("h2",{"style":"font-size:17px;font-weight:700;color:#f0f6fc;margin-bottom:14px;"+(style||"")},[""+text]);}
function btn(label,cls,a,b_){var b=el("button",{"class":"btn "+(cls||"")});var handler=typeof a==="function"?a:(typeof b_==="function"?b_:null);var style=typeof a==="string"?a:(typeof b_==="string"?b_:"");b.style.cssText=style;if(handler)b.onclick=handler;b.appendChild(document.createTextNode(""+label));return b;}
function lbl(text){return el("label",{"class":"form-label"},[""+text]);}
function fgrp(labelText,input,style){var g=div("form-group",style||"");if(labelText)g.appendChild(lbl(labelText));g.appendChild(input);return g;}
function inpText(val,ph,oninput,style){var i=el("input",{"class":"inp","type":"text","placeholder":ph||"","value":val||"","style":style||""});i.addEventListener("input",function(){oninput(this.value);});return i;}
function inpDate(val,oninput){var i=el("input",{"class":"inp","type":"date","value":val||""});i.addEventListener("input",function(){oninput(this.value);});return i;}
function inpNum(val,oninput,min){var i=el("input",{"class":"inp","type":"number","value":""+val,"min":min||"0","step":"0.01"});i.value=""+val;i.addEventListener("input",function(){oninput(parseFloat(this.value)||0);});return i;}
function inpPw(val,ph,oninput){var i=el("input",{"class":"inp","type":"password","placeholder":ph||"","value":val||""});i.addEventListener("input",function(){oninput(this.value);});return i;}
function mkSel(val,opts,onchange,style){var s=el("select",{"class":"sel","style":style||""});opts.forEach(function(o){var opt=el("option",{"value":o.value},[""+o.label]);if(o.value===val)opt.selected=true;s.appendChild(opt);});s.addEventListener("change",function(){onchange(this.value);});return s;}
function textarea(val,ph,oninput,style){var t=el("textarea",{"class":"inp","placeholder":ph||"","style":"resize:vertical;min-height:70px;"+(style||"")});t.value=val||"";t.addEventListener("input",function(){oninput(this.value);});return t;}
function colorDot(col,selected,onclick){var d=div("","width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;background:"+col+";border:2px solid "+(selected?"#fff":"transparent")+";");d.onclick=onclick;return d;}
function colorPicker(selectedColor,onChange){var wrap=div("","display:flex;gap:4px;flex-wrap:wrap;align-items:center;");STAFF_COLORS.forEach(function(col){wrap.appendChild(colorDot(col,selectedColor===col,function(){onChange(col);}));});return wrap;}
function searchInput(val,ph,oninput){var w=div("search-wrap","flex:1;min-width:160px;");w.appendChild(span("search-icon","",["🔍"]));var i=el("input",{"class":"inp","placeholder":ph||"Rechercher...","value":val||""});i.addEventListener("input",function(){oninput(this.value);});w.appendChild(i);return w;}
function emptyState(icon,text,sub){return div("","text-align:center;padding:48px 16px;color:#8b949e;",[div("","font-size:36px;margin-bottom:8px;",[icon]),div("","font-weight:600;color:#c9d1d9;margin-bottom:4px;",[text]),div("","font-size:12px;",[sub])]);}
function statusBadge(status){var map={"En cours":"b-red","Resolu":"b-green","En attente":"b-yellow","Annule":"b-grey"};return span("badge "+(map[status]||"b-grey"),"",[""+status]);}

// ============================================================
// RENDER
// ============================================================
function render(){
  var app=document.getElementById("app");
  if(!app)return;
  while(app.firstChild)app.removeChild(app.firstChild);

  ap(modal,div("modal-title","",[m.title]));
  if(m.content)ap(modal,m.content);
  var fbRow=div("","display:flex;gap:7px;margin-top:12px;");
  if(m.confirm)ap(fbRow,btn(m.confirmLabel||"Confirmer","btn-primary",function(){S.modal=null;m.confirm();render();},""));
  ap(fbRow,btn("Fermer","btn-secondary",function(){S.modal=null;render();},""));
  ap(modal,fbRow);ap(overlay,modal);return overlay;
}

// ============================================================
// SESSION PERSISTENCE
// ============================================================
function saveSession(){
  try{
    if(S.loggedIn&&S.user){
      localStorage.setItem("hh_session",JSON.stringify({user:S.user,permissions:S.permissions,ts:Date.now()}));
    }
  }catch(e){}
}
function loadSession(){
  try{
    var raw=localStorage.getItem("hh_session");
    if(!raw)return false;
    var sess=JSON.parse(raw);
    // Session expires after 12 hours
    if(Date.now()-sess.ts>43200000){localStorage.removeItem("hh_session");return false;}
    if(sess.user&&sess.permissions){
      S.user=sess.user;S.permissions=sess.permissions;S.loggedIn=true;S.page="dashboard";
      return true;
    }
  }catch(e){}
  return false;
}
function clearSession(){
  try{localStorage.removeItem("hh_session");}catch(e){}
}

// ============================================================
// AUTO-REFRESH
// ============================================================
var _lastRefresh=0;
function autoRefresh(){
  if(!S.loggedIn)return;
  var now=Date.now();
  if(now-_lastRefresh<28000)return; // min 28s between refreshes
  _lastRefresh=now;
  fetch("/api/data").then(function(r){return r.json();}).then(function(d){
    S.data=d;
    render();
  }).catch(function(){});
}
setInterval(autoRefresh,30000);

// ============================================================
// BOOT
// ============================================================
function boot(){
  loadFromServer();
}
boot();
